<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subsolar Point Calculator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1b2735, #090a0f);
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.main-card {
    width: 90%;
    max-width: 900px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

h1 {
    margin-top: 0;
    font-weight: 500;
    letter-spacing: 1px;
}

.controls {
    margin-bottom: 20px;
}

input[type="datetime-local"] {
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    margin-right: 10px;
}

button {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: #ffcc00;
    color: #000;
    font-weight: bold;
    transition: 0.3s ease;
}

button:hover {
    background: #ffaa00;
    transform: scale(1.05);
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    font-size: 16px;
    text-align: left;
}

#map {
    height: 400px;
    margin-top: 20px;
    border-radius: 15px;
    overflow: hidden;
}

@media (max-width: 768px) {

    body {
        align-items: flex-start;
        padding: 20px 0;
    }

    .main-card {
        width: 95%;
        padding: 20px;
        border-radius: 15px;
    }

    h1 {
        font-size: 20px;
        text-align: center;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    input[type="datetime-local"] {
        width: 100%;
        margin-right: 0;
        font-size: 14px;
    }

    button {
        width: 100%;
        font-size: 15px;
    }

    .result {
        font-size: 14px;
    }

    #map {
        height: 300px;
    }
}
</style>
</head>


<body>

<div class="main-card">

<h1>🌍 Subsolar Point Calculator</h1>

<div class="controls">
    <input type="datetime-local" id="datetime">
    <button onclick="calculate()">Calculate</button>
</div>

<div class="result" id="output">
    Enter a date and time to compute the subsolar point.
</div>

<div id="map"></div>

</div>




<script>

var map = L.map('map').setView([0,0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var marker;

function toJulian(date){
    return (date / 86400000) + 2440587.5;
}

function calculate(){

    let dt = document.getElementById("datetime").value;
    let utc = new Date(dt);
    let JD = toJulian(utc);
    let T = (JD - 2451545.0)/36525;

    let L0 = (280.46646 + T*(36000.76983 + T*0.0003032)) % 360;
    let M = 357.52911 + T*(35999.05029 - 0.0001537*T);
    let e = 0.016708634 - T*(0.000042037 + 0.0000001267*T);

    let C = (1.914602 - T*(0.004817 + 0.000014*T))*Math.sin(M*Math.PI/180)
          + (0.019993 - 0.000101*T)*Math.sin(2*M*Math.PI/180)
          + 0.000289*Math.sin(3*M*Math.PI/180);

    let trueLong = L0 + C;

    let omega = 125.04 - 1934.136*T;
    let lambda = trueLong - 0.00569 - 0.00478*Math.sin(omega*Math.PI/180);

    let epsilon0 = 23 + (26 + ((21.448 - T*(46.815 + T*(0.00059 - T*0.001813))))/60)/60;
    let epsilon = epsilon0 + 0.00256*Math.cos(omega*Math.PI/180);

    let RA = Math.atan2(Math.cos(epsilon*Math.PI/180)*Math.sin(lambda*Math.PI/180),
                        Math.cos(lambda*Math.PI/180)) * 180/Math.PI;

    let Dec = Math.asin(Math.sin(epsilon*Math.PI/180)*Math.sin(lambda*Math.PI/180)) * 180/Math.PI;

    let GMST = 280.46061837 + 360.98564736629*(JD-2451545)
                + T*T*(0.000387933 - T/38710000);

    GMST = (GMST % 360)/15;

    let subLon = (RA/15 - GMST) * 15;
    subLon = ((subLon + 540) % 360) - 180;

    let subLat = Dec;

    if(marker) map.removeLayer(marker);

    var sunIcon = L.divIcon({
    className: '',
    html: '☀️',
    iconSize: [45, 45],
    iconAnchor: [15, 15]
    });

    marker = L.marker([subLat, subLon], {icon: sunIcon}).addTo(map);
    map.setView([subLat, subLon], 4);

    document.getElementById("output").innerHTML =
        "Solar Declination: " + subLat.toFixed(2) + "°<br>" +
        "Solar Right Ascension: " + RA.toFixed(2) + "°<br>" +
        "Subsolar Latitude: " + subLat.toFixed(2) + "°<br>" +
        "Subsolar Longitude: " + subLon.toFixed(2) + "°";

}

</script>

</body>

</html>
